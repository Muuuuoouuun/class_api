# 고정 공개 URL 용 named tunnel 설정 예시 (운영 권장).
#
# 절차:
#   1) cloudflared tunnel login
#   2) cloudflared tunnel create <academy-slug>      # → TUNNEL_ID 와 credentials json 발급
#   3) 이 파일을 ~/.cloudflared/config.yml 로 복사 후 <...> 값 치환
#   4) cloudflared tunnel route dns <academy-slug> webhook.<academy>.example.com
#   5) cloudflared tunnel run <academy-slug>
#   6) 외부 도달 확인: https://webhook.<academy>.example.com/health → {"ok":true,...}
#   7) ClassIn Datasub 등록: https://webhook.<academy>.example.com/classin/webhook
#
# Windows 상시 구동은 docs/13_operations_runbook.md §1.3 (작업 스케줄러) 참고.
tunnel: <TUNNEL_ID>
credentials-file: <HOME>/.cloudflared/<TUNNEL_ID>.json
ingress:
  - hostname: webhook.<academy>.example.com
    service: http://localhost:8787
  - service: http_status:404
